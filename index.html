<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王将会計シュミレーター</title>

<link rel="icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
font-family:sans-serif;
background:#d8c9bd;
margin:0;
padding-bottom:120px;
}

header{
background:#d32f2f;
color:white;
text-align:center;
padding:14px;
font-size:20px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:white;
border-radius:14px;
padding:12px;
margin-bottom:10px;
}

.title{
font-size:16px;
margin-bottom:6px;
}

.row{
display:flex;
gap:6px;
}

select{
width:100%;
padding:8px;
border-radius:8px;
}

.addBtn{
text-align:center;
font-size:22px;
padding:8px;
background:#eee;
border-radius:10px;
}

.totalBox{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d32f2f;
color:white;
text-align:center;
padding:10px;
}

.total{
font-size:24px;
font-weight:bold;
}

.subText{
font-size:14px;
margin-top:5px;
}

button{
padding:8px;
border:none;
border-radius:8px;
}

.coupon button.active,
.member button.active{
background:#d32f2f;
color:white;
}

/* モーダル */
#modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
z-index:999;
}

.modalBg{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modalBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
background:#222;
color:white;
border-radius:16px;
padding:16px;
text-align:center;
}

.modalItem{
background:white;
color:black;
padding:10px;
margin:6px 0;
border-radius:10px;
}
</style>
</head>

<body>

<header>王将会計シュミレーター</header>

<div class="container" id="orders"></div>

<div class="card" id="addBtn">＋ メニュー追加</div>

<div class="card coupon">
<div class="title">クーポン</div>
<button onclick="setCoupon(0,this)">なし</button>
<button onclick="setCoupon(100,this)">100円引き</button>
<button onclick="setCoupon(200,this)">200円引き</button>
<button onclick="setCoupon(250,this)">250円引き</button>
</div>

<div class="card member">
<div class="title">餃子倶楽部割引</div>
<button onclick="setDiscount(0,this)">なし</button>
<button onclick="setDiscount(5,this)">5%</button>
<button onclick="setDiscount(7,this)">7%</button>
<button onclick="setDiscount(10,this)">10%</button>
</div>

<div class="totalBox">
<div class="total" id="total">¥0</div>
<div class="subText" id="stepText"></div>
</div>

<!-- モーダル -->
<div id="modal">
<div class="modalBg" onclick="closeModal()"></div>
<div class="modalBox">
<div>おすすめ</div>
<div id="modalList"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>
let menus=[]
let orders=[]
let coupon=0
let discount=0

fetch("menu.csv")
.then(res=>res.text())
.then(text=>{
const lines=text.split("\n").slice(1)

menus=lines.map(l=>{
const [genre,name,price]=l.split(",")
return {genre,name,price:Math.floor(price*1.1)}
})
init()
})

function init(){
addOrder()
addOrder()
addOrder()
}

function addOrder(){
orders.push({price:0})

const i=orders.length-1

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div class="title">注文${i+1}</div>
<select onchange="selectMenu(this,${i})">
<option value="">選択</option>
${menus.map(m=>`<option value="${m.price}">${m.name} ¥${m.price}</option>`).join("")}
</select>
`

document.getElementById("orders").appendChild(div)
}

document.getElementById("addBtn").onclick=addOrder

function selectMenu(el,i){
const val=Number(el.value)||0
orders[i].price=val
calc()
}

function setCoupon(v,btn){
coupon=v
document.querySelectorAll(".coupon button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function setDiscount(v,btn){
discount=v
document.querySelectorAll(".member button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function calc(){

let sum=orders.reduce((a,b)=>a+b.price,0)

sum-=coupon
sum=sum*(1-discount/100)

sum=Math.floor(sum)

document.getElementById("total").innerText="¥"+sum

// 刻み
let targets=[1000,1500,2000]

let text=""

targets.forEach(t=>{
if(sum<t){
let diff=t-sum
text+=`${t}円まであと ¥${diff} `
+`<button onclick="suggest(${diff})">＋</button><br>`
}
})

document.getElementById("stepText").innerHTML=text
}

function suggest(diff){

let list=menus
.map(m=>({
...m,
d:Math.abs(m.price-diff)
}))
.sort((a,b)=>a.d-b.d)
.slice(0,3)

const box=document.getElementById("modalList")
box.innerHTML=""

list.forEach(m=>{
const div=document.createElement("div")
div.className="modalItem"
div.innerText=`${m.name} ¥${m.price}`

div.onclick=()=>{
addOrder()
orders[orders.length-1].price=m.price
calc()
closeModal()
}

box.appendChild(div)
})

document.getElementById("modal").style.display="block"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}
</script>

</body>
</html>
