<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>餃子の王将 会計シミュレーター</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b00020">

<style>
body{
font-family:sans-serif;
background:#d8c9bd;
margin:0;
padding-bottom:160px;
display:flex;
justify-content:center;
}

.wrapper{
width:100%;
max-width:420px;
}

header{
background:#b00020;
color:white;
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.container{
padding:0 10px 10px;
}

.card{
background:white;
border-radius:14px;
padding:12px;
margin-bottom:8px;
border:2px solid #ccc;
}

.title{
font-size:14px;
display:flex;
gap:8px;
align-items:center;
}

.genreSelect{
flex:1;
}

select{
width:100%;
padding:12px;
border-radius:8px;
font-size:15px;
margin-top:6px;
}

.addBtn{
width:50%;
margin:0 auto 8px;
text-align:center;
font-size:16px;
padding:12px;
background:#ffcc00;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin:4px;
background:#eee;
border:2px solid #999;
}

button.active{
background:#003f88;
color:white;
border-color:#003f88;
}

.stepBox{
position:fixed;
bottom:100px;
left:0;
right:0;
display:flex;
justify-content:center;
}

.stepInner{
width:100%;
max-width:420px;
background:#f4f4f4;
padding:12px;
text-align:center;
border-radius:12px;
margin-bottom:10px;
}

.totalBox{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:center;
}

.totalInner{
width:100%;
max-width:420px;
background:#b00020;
color:white;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
padding:12px;
}

#modal{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
z-index:999;
}

.modalBg{
position:absolute;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.modalBox{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:85%;
background:#222;
color:white;
border-radius:16px;
padding:16px;
text-align:center;
}

.modalItem{
background:white;
color:black;
padding:10px;
margin:6px 0;
border-radius:10px;
}

.detail{
font-size:14px;
line-height:1.6;
}

.detail span{
float:right;
}
</style>
</head>

<body>

<div class="wrapper">

<header>餃子の王将 会計シミュレーター</header>

<div class="container" id="orders"></div>

<div class="container">

<div class="addBtn" onclick="addOrder()">＋ メニュー追加</div>

<div class="card coupon">
<div class="title">クーポン</div>
<button onclick="setCoupon(0,this)">なし</button>
<button onclick="setCoupon(100,this)">100円引き</button>
<button onclick="setCoupon(200,this)">200円引き</button>
<button onclick="setCoupon(250,this)">250円引き</button>
</div>

<div class="card member">
<div class="title">餃子倶楽部割引</div>
<button onclick="setDiscount(0,this)">なし</button>
<button onclick="setDiscount(5,this)">5%</button>
<button onclick="setDiscount(7,this)">7%</button>
<button onclick="setDiscount(10,this)">10%</button>
</div>

<div class="card detail">
<div>小計 <span id="subTotal">0円</span></div>
<div>クーポン <span id="couponVal">なし</span></div>
<div>会員割引 <span id="discountVal">0円</span></div>
</div>

</div>

</div>
  
<div class="card">
  <div style="font-size:10px;color:#888;">広告</div>

  <a href="https://hb.afl.rakuten.co.jp/ichiba/52149eff.db4cb4a5.52149f00.6690fb04/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Ff112127-higasimatuyama%2Fhgm00474%2F&link_type=pict&ut=eyJwYWdlIjoiaXRlbSIsInR5cGUiOiJwaWN0Iiwic2l6ZSI6IjEyOHgxMjgiLCJuYW0iOjEsIm5hbXAiOiJyaWdodCIsImNvbSI6MSwiY29tcCI6ImRvd24iLCJwcmljZSI6MCwiYm9yIjoxLCJjb2wiOjEsImJidG4iOjEsInByb2QiOjAsImFtcCI6ZmFsc2V9"
     target="_blank" rel="nofollow sponsored noopener">

    <img src="https://hbb.afl.rakuten.co.jp/hgb/52149eff.db4cb4a5.52149f00.6690fb04/?me_id=1407619&item_id=10000505&pc=https%3A%2F%2Fthumbnail.image.rakuten.co.jp%2F%400_mall%2Ff112127-higasimatuyama%2Fcabinet%2F0152%2Fr_p0152002_00.jpg%3F_ex%3D128x128&s=128x128&t=pict"
    style="width:100%; border-radius:10px;">
  
  </a>
</div>
  
<div class="stepBox"><div class="stepInner" id="stepBox"></div></div>

<div class="totalBox">
<div class="totalInner" id="total"></div>
</div>

<div id="modal">
<div class="modalBg" onclick="closeModal()"></div>
<div class="modalBox">
<div>おすすめ</div>
<div id="modalList"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let menus=[]
let orders=[]
let coupon=0
let discount=0

fetch("menu.csv")
.then(res=>res.text())
.then(text=>{
  const lines = text.split(/\r?\n/).slice(1)

  menus=lines.map(l=>{
    const [genre,name,price]=l.split(",")
    return {genre,name,price:Number(price)}
  })

  init()
})

function init(){
addOrder()
calc()
}

function addOrder(){

orders.push({price:0})
const i=orders.length-1

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div class="title">
<span>注文${i+1}</span>
<select class="genreSelect" onchange="changeGenre(this,${i})">
<option value="">ジャンル</option>
${[...new Set(menus.map(m=>m.genre))].map(g=>`<option>${g}</option>`).join("")}
</select>
<button onclick="removeOrder(${i})">削除</button>
</div>

<select id="menu${i}" onchange="selectMenu(this,${i})">
<option value="">メニュー</option>
</select>
`

document.getElementById("orders").appendChild(div)
}

function removeOrder(i){
orders.splice(i,1)

const cards=document.querySelectorAll("#orders .card")
if(cards[i]) cards[i].remove()

document.querySelectorAll("#orders .card .title span")
.forEach((el,idx)=>el.innerText=`注文${idx+1}`)

rebindEvents()
calc()
}

function rebindEvents(){
document.querySelectorAll("#orders .card").forEach((card,i)=>{
const genre=card.querySelector(".genreSelect")
const menu=card.querySelector("select[id^='menu']")

genre.setAttribute("onchange",`changeGenre(this,${i})`)
menu.setAttribute("onchange",`selectMenu(this,${i})`)
menu.id="menu"+i
})
}

function changeGenre(el,i){
const menuSel=document.getElementById("menu"+i)
menuSel.innerHTML=`<option value="">メニュー</option>`

menus.filter(m=>m.genre===el.value)
.forEach(m=>{
menuSel.innerHTML+=`<option value="${m.price}">${m.name} ¥${m.price}</option>`
})
}

function selectMenu(el,i){
orders[i].price=Number(el.value)||0
calc()
}

function setCoupon(v,btn){
coupon=v
document.querySelectorAll(".coupon button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function setDiscount(v,btn){
discount=v
document.querySelectorAll(".member button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function calc(){

let base=orders.reduce((a,b)=>a+b.price,0)
let taxed=Math.floor(base*1.1)

let afterCoupon=taxed-coupon
if(afterCoupon<0)afterCoupon=0

let discountAmount=Math.floor(afterCoupon*(discount/100))
let total=Math.floor(afterCoupon-discountAmount)

document.getElementById("total").innerHTML=
`<span>お会計</span><span style="font-size:34px">¥${total}</span><span>税込</span>`

document.getElementById("subTotal").innerText=taxed+"円"
document.getElementById("couponVal").innerText=coupon?`-¥${coupon}`:"なし"
document.getElementById("discountVal").innerText="-"+discountAmount+"円"

let next=Math.ceil(total/500)*500
let diff=next-total

document.getElementById("stepBox").innerHTML=
`${next}円まであと ¥${diff} <button onclick="suggest(${diff})">＋</button>`
}

function suggest(diff){

let emptyIndex=orders.findIndex(o=>o.price===0)

let list=menus.map(m=>{
let taxed=Math.floor(m.price*1.1)
return {...m,taxed,d: taxed>=diff?taxed-diff:10000}
})
.sort((a,b)=>a.d-b.d)
.slice(0,3)

const box=document.getElementById("modalList")
box.innerHTML=""

list.forEach(m=>{
const div=document.createElement("div")
div.className="modalItem"
div.innerText=`${m.name} ¥${m.taxed}`

div.onclick=()=>{

let indexToUse=emptyIndex

if(indexToUse===-1){
addOrder()
indexToUse=orders.length-1
}

orders[indexToUse]={price:m.price,genre:m.genre}

const genreSelect=document.querySelectorAll(".genreSelect")[indexToUse]
const menuSelect=document.getElementById("menu"+indexToUse)

if(genreSelect && menuSelect){
genreSelect.value=m.genre
changeGenre(genreSelect,indexToUse)
setTimeout(()=>{menuSelect.value=m.price},0)
}

calc()
closeModal()
}

box.appendChild(div)
})

document.getElementById("modal").style.display="block"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}
</script>

</body>
</html>
