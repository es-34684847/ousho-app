<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>餃子の王将 会計シミュレーター｜クーポン・割引込みで合計を自動計算</title>

<meta name="description" content="餃子の王将の会計を自動計算できる無料シミュレーター。クーポン・餃子倶楽部割引に対応し、注文前に合計金額を確認できます。">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://es-34684847.github.io/ousho-app/">

<!-- OGP -->
<meta property="og:title" content="餃子の王将 会計シミュレーター">
<meta property="og:description" content="クーポン・割引対応の無料計算ツール">
<meta property="og:type" content="website">
<meta property="og:image" content="icon.png">

<link rel="icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.png">

<!-- 構造化データ -->
<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "WebApplication",
 "name": "餃子の王将 会計シミュレーター",
 "description": "餃子の王将の会計をクーポンや割引込みで計算できるツール",
 "applicationCategory": "FinanceApplication",
 "operatingSystem": "All",
 "inLanguage": "ja"
}
</script>

<style>
body{
font-family:sans-serif;
background:#d8c9bd;
margin:0;
padding-bottom:160px;
display:flex;
justify-content:center;
}
.wrapper{
width:100%;
max-width:420px;
}
header{
background:#d32f2f;
color:white;
text-align:center;
padding:14px;
font-size:20px;
font-weight:bold;
}
.container{
padding:0 10px 10px;
}
.card{
background:white;
border-radius:14px;
padding:12px;
margin-bottom:8px;
}
.title{
font-size:14px;
display:flex;
gap:8px;
align-items:center;
}
.genreSelect{
flex:1;
}
select{
width:100%;
padding:12px;
border-radius:8px;
font-size:15px;
margin-top:6px;
}
.addBtn{
width:50%;
margin:0 auto 8px;
text-align:center;
font-size:16px;
padding:12px;
background:#bdbdbd;
border-radius:10px;
box-shadow:0 3px 0 #9e9e9e;
cursor:pointer;
}
.addBtn:active{
transform:translateY(2px);
box-shadow:0 1px 0 #9e9e9e;
}
button{
padding:10px;
border:none;
border-radius:8px;
margin:4px;
background:#eee;
}
.coupon button.active,
.member button.active{
background:#2f5fb3;
color:white;
}
.stepBox{
position:fixed;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
}
.stepInner{
width:100%;
max-width:420px;
background:#f4f4f4;
padding:8px;
text-align:center;
}
.totalBox{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:center;
}
.totalInner{
width:100%;
max-width:420px;
background:#d32f2f;
color:white;
text-align:center;
padding:10px;
}
.total{
font-size:24px;
font-weight:bold;
}
#modal{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
z-index:999;
}
.modalBg{
position:absolute;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}
.modalBox{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:85%;
background:#222;
color:white;
border-radius:16px;
padding:16px;
text-align:center;
}
.modalItem{
background:white;
color:black;
padding:10px;
margin:6px 0;
border-radius:10px;
}
.detail{
font-size:14px;
line-height:1.6;
}
.detail span{
float:right;
}
</style>
</head>

<body>

<!-- 見えないh1（SEO用） -->
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;">
餃子の王将の会計をクーポン・割引込みで計算できるシミュレーター
</h1>

<div class="wrapper">

<header>餃子の王将 会計シミュレーター</header>

<div class="container" id="orders"></div>

<div class="container">

<div class="addBtn" onclick="addOrder()">＋ メニュー追加</div>

<div class="card coupon">
<div class="title">クーポン</div>
<button onclick="setCoupon(0,this)">なし</button>
<button onclick="setCoupon(100,this)">100円引き</button>
<button onclick="setCoupon(200,this)">200円引き</button>
<button onclick="setCoupon(250,this)">250円引き</button>
</div>

<div class="card member">
<div class="title">餃子倶楽部割引</div>
<button onclick="setDiscount(0,this)">なし</button>
<button onclick="setDiscount(5,this)">5%</button>
<button onclick="setDiscount(7,this)">7%</button>
<button onclick="setDiscount(10,this)">10%</button>
</div>

<div class="card detail">
<div>小計 <span id="subTotal">0円</span></div>
<div>クーポン <span id="couponVal">0円</span></div>
<div>会員割引 <span id="discountVal">0円</span></div>
</div>

</div>

</div>

<div class="stepBox"><div class="stepInner" id="stepBox"></div></div>

<div class="totalBox">
<div class="totalInner">
<div class="total" id="total">¥0（税込）</div>
</div>
</div>

<!-- SEOテキスト（極小・UI影響ほぼなし） -->
<div style="font-size:11px; color:#777; padding:6px;">
餃子の王将の会計を自動計算。クーポン・割引対応。
 <!-- ←ここに入れる -->
<div style="position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden;">
テキスト
</div>
</div>

<div id="modal">
<div class="modalBg" onclick="closeModal()"></div>
<div class="modalBox">
<div>おすすめ</div>
<div id="modalList"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>

let menus=[]
let orders=[]
let coupon=0
let discount=0

fetch("menu.csv")
.then(res=>res.text())
.then(text=>{
const lines=text.split("\n").slice(1)

menus=lines.map(l=>{
const [genre,name,price]=l.split(",")
return {genre,name,price:Number(price)}
})

init()
})

function init(){
addOrder()
addOrder()
addOrder()
}

function addOrder(){

orders.push({price:0})

const i=orders.length-1

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div class="title">
<span>注文${i+1}</span>
<select class="genreSelect" onchange="changeGenre(this,${i})">
<option value="">ジャンル</option>
${[...new Set(menus.map(m=>m.genre))].map(g=>`<option>${g}</option>`).join("")}
</select>
</div>

<select id="menu${i}" onchange="selectMenu(this,${i})">
<option value="">メニュー</option>
</select>
`

document.getElementById("orders").appendChild(div)
}

function changeGenre(el,i){
const menuSel=document.getElementById("menu"+i)
menuSel.innerHTML=`<option value="">メニュー</option>`

menus.filter(m=>m.genre===el.value)
.forEach(m=>{
menuSel.innerHTML+=`<option value="${m.price}">${m.name} ¥${m.price}</option>`
})
}

function selectMenu(el,i){
orders[i].price=Number(el.value)||0
calc()
}

function setCoupon(v,btn){
coupon=v
document.querySelectorAll(".coupon button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function setDiscount(v,btn){
discount=v
document.querySelectorAll(".member button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function calc(){

let base=orders.reduce((a,b)=>a+b.price,0)
let taxed=Math.floor(base*1.1)

let afterCoupon=taxed-coupon
if(afterCoupon<0)afterCoupon=0

let discountAmount=Math.floor(afterCoupon*(discount/100))

let total=Math.floor(afterCoupon-discountAmount)

document.getElementById("total").innerText="¥"+total+"（税込）"
document.getElementById("subTotal").innerText=taxed+"円"
document.getElementById("couponVal").innerText="-"+coupon+"円"
document.getElementById("discountVal").innerText="-"+discountAmount+"円"

let next=Math.ceil(total/500)*500
let diff=next-total

document.getElementById("stepBox").innerHTML=
`${next}円まであと ¥${diff} <button onclick="suggest(${diff})">＋</button>`
}

function suggest(diff){

let emptyIndex=orders.findIndex(o=>o.price===0)

let list=menus.map(m=>{
let taxed=Math.floor(m.price*1.1)
return {...m,taxed,d:Math.abs(taxed-diff)}
})
.sort((a,b)=>a.d-b.d)
.slice(0,3)

const box=document.getElementById("modalList")
box.innerHTML=""

list.forEach(m=>{
const div=document.createElement("div")
div.className="modalItem"
div.innerText=`${m.name} ¥${m.taxed}`

div.onclick=()=>{

let indexToUse=emptyIndex

if(indexToUse===-1){
addOrder()
indexToUse=orders.length-1
}

orders[indexToUse]={price:m.price,genre:m.genre}

const genreSelect=document.querySelectorAll(".genreSelect")[indexToUse]
const menuSelect=document.getElementById("menu"+indexToUse)

if(genreSelect && menuSelect){
genreSelect.value=m.genre
changeGenre(genreSelect,indexToUse)

setTimeout(()=>{
menuSelect.value=m.price
},0)
}

calc()
closeModal()
}

box.appendChild(div)
})

document.getElementById("modal").style.display="block"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
