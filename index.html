<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>王将会計シミュレーター</title>

<link rel="icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
margin:0;
font-family:sans-serif;
background:#d9cfc7;
}

.header{
background:#d82222;
color:white;
text-align:center;
padding:14px;
font-weight:bold;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
padding-bottom:160px;
}

.card{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:12px;
}

.orderHeader{
display:flex;
gap:10px;
align-items:center;
margin-bottom:8px;
}

select{
width:100%;
padding:10px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
margin:4px;
border-radius:8px;
border:1px solid #ccc;
background:white;
}

button.active{
background:#d82222;
color:white;
border:none;
}

/* ＋追加 */
.addBtn{
width:100%;
padding:8px;
border:1px dashed #aaa;
border-radius:8px;
background:#fafafa;
font-size:14px;
margin-bottom:12px;
}

/* 刻み */
.nextPay{
position:fixed;
bottom:65px;
left:0;
right:0;
background:#f4f4f4;
padding:8px;
text-align:center;
font-size:14px;
}

/* 合計 */
.totalBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d82222;
color:white;
display:flex;
justify-content:space-between;
padding:15px;
font-size:20px;
}

/* モーダル */

#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
z-index:999;
}

.modalBg{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modalBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
max-width:320px;
background:#222;
color:white;
border-radius:16px;
padding:16px;
text-align:center;
}

.modalTitle{
font-size:20px;
margin-bottom:10px;
}

.modalItem{
background:white;
color:black;
padding:12px;
margin:8px 0;
border-radius:10px;
font-weight:bold;
}

.modalClose{
margin-top:10px;
width:100%;
padding:10px;
background:#555;
color:white;
border:none;
border-radius:10px;
}
  
</style>
</head>

<body>

<div class="header">
王将会計シミュレーター
</div>

<div class="container">

<div id="orders"></div>

<button class="addBtn" onclick="addOrder()">＋ メニューを追加</button>

<div class="card">
<div>クーポン</div>
<button onclick="setCoupon(0,this)">なし</button>
<button onclick="setCoupon(100,this)">100円引き</button>
<button onclick="setCoupon(200,this)">200円引き</button>
<button onclick="setCoupon(250,this)">250円引き</button>
</div>

<div class="card">
<div>餃子倶楽部割引</div>
<button onclick="setDiscount(0,this)">なし</button>
<button onclick="setDiscount(5,this)">5%</button>
<button onclick="setDiscount(7,this)">7%</button>
<button onclick="setDiscount(10,this)">10%</button>
</div>

</div>

<div class="nextPay" id="nextPay"></div>

<div class="totalBar">
<div>合計</div>
<div id="total">¥0</div>
</div>

<script>

let menus=[]
let coupon=0
let discount=0
let orderCount=0

async function loadCSV(){

const res=await fetch("menu.csv")
const text=await res.text()

const rows=text.trim().split(/\r?\n/)

rows.slice(1).forEach(r=>{
const c=r.split(",")
if(c.length<3)return

menus.push({
genre:c[0],
name:c[1],
price:Number(c[2])
})
})

addOrder()
addOrder()
addOrder()

}

function addOrder(){

orderCount++

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="orderHeader">
注文${orderCount}
<select id="genre${orderCount}"></select>
</div>

<div>メニュー</div>
<select id="menu${orderCount}">
<option value="">メニュー</option>
</select>

`

document.getElementById("orders").appendChild(div)

setup(orderCount)

}

function setup(i){

const genreSel=document.getElementById("genre"+i)
const menuSel=document.getElementById("menu"+i)

const genres=[...new Set(menus.map(m=>m.genre))]

genreSel.innerHTML='<option value="">ジャンル</option>'

genres.forEach(g=>{
const opt=document.createElement("option")
opt.value=g
opt.text=g
genreSel.appendChild(opt)
})

genreSel.addEventListener("change",()=>{

menuSel.innerHTML='<option value="">メニュー</option>'

menus
.filter(m=>m.genre===genreSel.value)
.forEach(m=>{
const opt=document.createElement("option")
opt.value=m.price
opt.text=m.name+" ¥"+m.price
menuSel.appendChild(opt)
})

calc()

})

menuSel.addEventListener("change",calc)

}

function setActive(btn){

const buttons=btn.parentElement.querySelectorAll("button")
buttons.forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

}

function setCoupon(v,btn){
coupon=v
setActive(btn)
calc()
}

function setDiscount(v,btn){
discount=v
setActive(btn)
calc()
}

function calc(){

let total=0

for(let i=1;i<=orderCount;i++){

const el=document.getElementById("menu"+i)

if(el && el.value){
total+=Number(el.value)
}

}

const tax=Math.round(total*1.1)

let result=tax-coupon
if(result<0) result=0

result=Math.round(result*(1-discount/100))

document.getElementById("total").innerText="¥"+result

// 刻み（税込後）

const next500=Math.ceil(result/500)*500

let text=""

for(let i=0;i<2;i++){

const target=next500+(i*500)
const diff=target-result

text+=`
${target}円まであと ¥${diff}
<button onclick="suggest(${diff})">＋</button><br>
`

}

document.getElementById("nextPay").innerHTML=text

}

function suggest(diff){

let list=menus
.map(m=>{
return {
name:m.name,
price:m.price,
diff:Math.abs(m.price-diff)
}
})
.sort((a,b)=>a.diff-b.diff)
.slice(0,3)

const box=document.getElementById("modalList")
box.innerHTML=""

list.forEach(item=>{

const div=document.createElement("div")
div.className="modalItem"
div.innerText=`${item.name} ¥${item.price}`

div.onclick=()=>{
addFromModal(item)
}

box.appendChild(div)

})

document.getElementById("modal").style.display="block"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function addFromModal(item){

addOrder()

const i=orderCount

document.getElementById("menu"+i).innerHTML=
`<option value="${item.price}">${item.name} ¥${item.price}</option>`

calc()

closeModal()

}

}

loadCSV()

</script>
<div id="modal" style="display:none;">
  <div class="modalBg" onclick="closeModal()"></div>

  <div class="modalBox">
    <div class="modalTitle">おすすめ</div>

    <div id="modalList"></div>

    <button class="modalClose" onclick="closeModal()">閉じる</button>
  </div>
</div>
</body>
</html>
