<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>王将会計シミュレーター</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#d9cfc7;
}

.header{
background:#d82222;
color:white;
text-align:center;
padding:14px;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
padding-bottom:160px;
}

.card{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:12px;
}

.orderHeader{
display:flex;
gap:10px;
align-items:center;
margin-bottom:8px;
}

select{
width:100%;
padding:10px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

.menuLabel{
font-size:13px;
margin-bottom:4px;
}

button{
padding:8px 12px;
margin:4px;
border-radius:8px;
border:1px solid #ccc;
background:white;
}

button.active{
background:#d82222;
color:white;
border:none;
}

/* ＋追加 */

.addBtn{
width:100%;
padding:10px;
background:#fff;
border:2px dashed #aaa;
border-radius:10px;
}

/* 刻み */

.nextPay{
position:fixed;
bottom:65px;
left:0;
right:0;
background:#f4f4f4;
padding:8px;
text-align:center;
font-size:14px;
}

/* 合計 */

.totalBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#d82222;
color:white;
display:flex;
justify-content:space-between;
padding:15px;
font-size:20px;
}

</style>

</head>

<body>

<div class="header">
王将会計シミュレーター
</div>

<div class="container" id="orders"></div>

<button class="addBtn" onclick="addOrder()">＋ メニュー追加</button>

<div class="nextPay" id="nextPay"></div>

<div class="totalBar">
<div>合計</div>
<div id="total">¥0</div>
</div>

<script>

let menus=[]
let coupon=0
let discount=0
let orderCount=0

async function loadCSV(){

const res=await fetch("menu.csv")
const text=await res.text()

const rows=text.trim().split(/\r?\n/)

rows.slice(1).forEach(r=>{
const c=r.split(",")
menus.push({
genre:c[0],
name:c[1],
price:Number(c[2])
})
})

addOrder()
addOrder()
addOrder()

}

function addOrder(){

orderCount++

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="orderHeader">
注文${orderCount}
<select id="genre${orderCount}"></select>
</div>

<div class="menuLabel">メニュー</div>
<select id="menu${orderCount}">
<option value="">メニュー</option>
</select>

`

document.getElementById("orders").appendChild(div)

setup(orderCount)

}

function setup(i){

const genreSel=document.getElementById("genre"+i)
const menuSel=document.getElementById("menu"+i)

const genres=[...new Set(menus.map(m=>m.genre))]

genreSel.innerHTML='<option value="">ジャンル</option>'

genres.forEach(g=>{
const opt=document.createElement("option")
opt.value=g
opt.text=g
genreSel.appendChild(opt)
})

genreSel.addEventListener("change",()=>{

menuSel.innerHTML='<option value="">メニュー</option>'

menus
.filter(m=>m.genre===genreSel.value)
.forEach(m=>{
const opt=document.createElement("option")
opt.value=m.price
opt.text=m.name+" ¥"+m.price
menuSel.appendChild(opt)
})

calc()

})

menuSel.addEventListener("change",calc)

}

function calc(){

let total=0

for(let i=1;i<=orderCount;i++){

const el=document.getElementById("menu"+i)
if(el && el.value){
total+=Number(el.value)
}

}

const tax=Math.round(total*1.1)
document.getElementById("total").innerText="¥"+tax

// 刻み（税込後）

const next500=Math.ceil(tax/500)*500

let text=""

for(let i=0;i<2;i++){

const target=next500+(i*500)
const diff=target-tax

text+=`
${target}円まであと ¥${diff}
<button onclick="autoAdd(${diff})">＋</button>
<br>
`

}

document.getElementById("nextPay").innerHTML=text

}

function autoAdd(diff){

// 一番近い商品探す
let best=null
let min=9999

menus.forEach(m=>{
const d=Math.abs(m.price-diff)
if(d<min){
min=d
best=m
}
})

if(best){

addOrder()

const i=orderCount

document.getElementById("menu"+i).innerHTML=
`<option value="${best.price}">${best.name} ¥${best.price}</option>`

calc()

}

}

loadCSV()

</script>

</body>
</html>
