<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>王将会計シミュレーター</title>

<link rel="icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{font-family:sans-serif;background:#d8c9bd;margin:0;padding-bottom:140px;}
header{background:#d32f2f;color:white;text-align:center;padding:14px;font-size:20px;font-weight:bold;}
.container{padding:10px;}
.card{background:white;border-radius:14px;padding:12px;margin-bottom:10px;}
.title{font-size:15px;margin-bottom:6px;}
select{width:100%;padding:8px;border-radius:8px;}
.addBtn{text-align:center;font-size:16px;padding:10px;background:#eee;border-radius:10px;}
button{padding:8px;border:none;border-radius:8px;}
.coupon button.active,.member button.active{background:#d32f2f;color:white;}
.stepBox{position:fixed;bottom:70px;left:0;right:0;background:#f4f4f4;text-align:center;padding:6px;font-size:14px;}
.totalBox{position:fixed;bottom:0;left:0;right:0;background:#d32f2f;color:white;text-align:center;padding:10px;}
.total{font-size:24px;font-weight:bold;}
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;}
.modalBg{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.modalBox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:85%;background:#222;color:white;border-radius:16px;padding:16px;text-align:center;}
.modalItem{background:white;color:black;padding:10px;margin:6px 0;border-radius:10px;}
.toggle{position:fixed;bottom:120px;right:10px;background:#d32f2f;color:white;padding:6px 10px;border-radius:20px;font-size:12px;}
</style>
</head>

<body>

<header>王将会計シミュレーター</header>

<div class="container" id="orders"></div>

<div class="container">

<div class="addBtn" onclick="addOrder()">＋ メニュー追加</div>

<div class="card coupon">
<div class="title">クーポン</div>
<button onclick="setCoupon(0,this)">なし</button>
<button onclick="setCoupon(100,this)">100円引き</button>
<button onclick="setCoupon(200,this)">200円引き</button>
<button onclick="setCoupon(250,this)">250円引き</button>
</div>

<div class="card member">
<div class="title">餃子倶楽部割引</div>
<button onclick="setDiscount(0,this)">なし</button>
<button onclick="setDiscount(5,this)">5%</button>
<button onclick="setDiscount(7,this)">7%</button>
<button onclick="setDiscount(10,this)">10%</button>
</div>

</div>

<div class="stepBox" id="stepBox"></div>
<div class="toggle" onclick="toggleStep()">刻み</div>

<div class="totalBox">
<div class="total" id="total">¥0</div>
</div>

<!-- モーダル -->
<div id="modal">
<div class="modalBg" onclick="closeModal()"></div>
<div class="modalBox">
<div>おすすめ</div>
<div id="modalList"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>

let menus=[]
let orders=[]
let coupon=0
let discount=0
let showStep=true

fetch("menu.csv")
.then(res=>res.text())
.then(text=>{
const lines=text.split("\n").slice(1)

menus=lines.map(l=>{
const [genre,name,price]=l.split(",")
return {genre,name,price:Number(price)}
})

init()
})

function init(){
addOrder()
addOrder()
addOrder()
}

function addOrder(){
orders.push({price:0,genre:""})
const i=orders.length-1

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div class="title">注文${i+1}</div>

<select onchange="changeGenre(this,${i})">
<option value="">ジャンル</option>
${[...new Set(menus.map(m=>m.genre))].map(g=>`<option>${g}</option>`).join("")}
</select>

<select id="menu${i}" onchange="selectMenu(this,${i})">
<option value="">メニュー</option>
</select>
`

document.getElementById("orders").appendChild(div)
}

function changeGenre(el,i){
const menuSel=document.getElementById("menu"+i)
menuSel.innerHTML=`<option value="">メニュー</option>`

menus
.filter(m=>m.genre===el.value)
.forEach(m=>{
menuSel.innerHTML+=`<option value="${m.price}">${m.name} ¥${m.price}</option>`
})
}

function selectMenu(el,i){
orders[i].price=Number(el.value)||0
calc()
}

function setCoupon(v,btn){
coupon=v
document.querySelectorAll(".coupon button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function setDiscount(v,btn){
discount=v
document.querySelectorAll(".member button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
calc()
}

function calc(){

// ① 税抜き合計
let base=orders.reduce((a,b)=>a+b.price,0)

// ② クーポン
base-=coupon
if(base<0)base=0

// ③ 消費税
let tax=Math.floor(base*1.1)

// ④ 餃子倶楽部
tax=Math.floor(tax*(1-discount/100))

document.getElementById("total").innerText="¥"+tax

// 刻み
if(!showStep){
document.getElementById("stepBox").innerHTML=""
return
}

let next=Math.ceil(tax/500)*500
let text=""

for(let i=0;i<2;i++){
let t=next+(i*500)
let diff=t-tax
text+=`${t}円まであと ¥${diff} <button onclick="suggest(${diff})">＋</button><br>`
}

document.getElementById("stepBox").innerHTML=text
}

function toggleStep(){
showStep=!showStep
calc()
}

function suggest(diff){

let list=menus
.map(m=>{
let taxed=Math.floor((m.price)*1.1)
return {
...m,
taxed,
d:Math.abs(taxed-diff)
}
})
.sort((a,b)=>a.d-b.d)
.slice(0,3)

const box=document.getElementById("modalList")
box.innerHTML=""

list.forEach(m=>{
const div=document.createElement("div")
div.className="modalItem"
div.innerText=`${m.name} ¥${m.taxed}`

div.onclick=()=>{
addOrder()
orders[orders.length-1].price=m.price
calc()
closeModal()
}

box.appendChild(div)
})

document.getElementById("modal").style.display="block"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
