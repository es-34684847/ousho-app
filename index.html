<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="favicon.ico">
  
<title>王将会計シミュレーター</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#d9cfc7;
}

.header{
background:#d82222;
color:white;
text-align:center;
padding:14px;
}

.headerTitle{
font-size:20px;
font-weight:bold;
}

.headerSub{
font-size:12px;
opacity:0.9;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
padding-bottom:140px;
}

.card{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.orderHeader{
display:flex;
gap:10px;
align-items:center;
margin-bottom:8px;
}

.orderTitle{
font-weight:bold;
}

.orderHeader select{
flex:1;
}

.menuLabel{
font-size:13px;
color:#555;
margin-bottom:4px;
}

select{
width:100%;
padding:10px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
margin:4px;
border-radius:8px;
border:1px solid #ccc;
background:white;
}

button.active{
background:#d82222;
color:white;
border:none;
}

/* 合計バー */

.totalBar{

position:fixed;
bottom:0;
left:0;
right:0;

background:#d82222;
color:white;

display:flex;
justify-content:space-between;
align-items:center;

padding:15px;

font-size:20px;
font-weight:bold;

box-shadow:0 -3px 10px rgba(0,0,0,0.2);

}

.totalPrice{
font-size:28px;
}

/* 500円刻み */

.nextPay{

position:fixed;
bottom:65px;
left:0;
right:0;

background:#f4f4f4;

text-align:center;
padding:8px;

font-size:14px;

}

.toggleBtn{

position:fixed;
bottom:110px;
right:10px;

background:#d82222;
color:white;

border:none;
border-radius:20px;

padding:8px 12px;

font-size:12px;

}

</style>

</head>

<body>

<div class="header">

<div class="headerTitle">
王将会計シミュレーター
</div>

<div class="headerSub">
餃子の王将 注文計算ツール
</div>

</div>

<div class="container">

<div class="card">

<div class="orderHeader">
<div class="orderTitle">注文1</div>
<select id="genre1"></select>
</div>

<div class="menuLabel">メニュー</div>
<select id="menu1"></select>

</div>

<div class="card">

<div class="orderHeader">
<div class="orderTitle">注文2</div>
<select id="genre2"></select>
</div>

<div class="menuLabel">メニュー</div>
<select id="menu2"></select>

</div>

<div class="card">

<div class="orderHeader">
<div class="orderTitle">注文3</div>
<select id="genre3"></select>
</div>

<div class="menuLabel">メニュー</div>
<select id="menu3"></select>

</div>

<div class="card">

<div style="font-weight:bold;margin-bottom:6px;">
クーポン
</div>

<button onclick="setCoupon(0,this)">なし</button>
<button onclick="setCoupon(100,this)">100円引き</button>
<button onclick="setCoupon(200,this)">200円引き</button>
<button onclick="setCoupon(250,this)">250円引き</button>

</div>

<div class="card">

<div style="font-weight:bold;margin-bottom:6px;">
餃子倶楽部割引
</div>

<button onclick="setDiscount(0,this)">なし</button>
<button onclick="setDiscount(5,this)">5%</button>
<button onclick="setDiscount(7,this)">7%</button>
<button onclick="setDiscount(10,this)">10%</button>

</div>

</div>

<button class="toggleBtn" onclick="toggleNext()">
刻み表示
</button>

<div class="nextPay" id="nextPay"></div>

<div class="totalBar">

<div>
合計
</div>

<div id="total" class="totalPrice">
¥0
</div>

</div>

<script>

let menus=[]
let coupon=0
let discount=0
let showNext=true

async function loadCSV(){

const res=await fetch("menu.csv")
const text=await res.text()

const rows=text.trim().split(/\r?\n/)

rows.slice(1).forEach(r=>{

const c=r.split(",")

if(c.length<3)return

menus.push({
genre:c[0],
name:c[1],
price:Number(c[2])
})

})

setupGenre()

}

function setupGenre(){

const genres=[...new Set(menus.map(m=>m.genre))]

for(let i=1;i<=3;i++){

const genreSel=document.getElementById("genre"+i)
const menuSel=document.getElementById("menu"+i)

genreSel.innerHTML='<option value="">ジャンル</option>'
menuSel.innerHTML='<option value="">メニュー</option>'

genres.forEach(g=>{

const opt=document.createElement("option")

opt.value=g
opt.text=g

genreSel.appendChild(opt)

})

genreSel.addEventListener("change",()=>{

menuSel.innerHTML='<option value="">メニュー</option>'

menus
.filter(m=>m.genre===genreSel.value)
.forEach(m=>{

const opt=document.createElement("option")

opt.value=m.price
opt.text=m.name+" ¥"+m.price

menuSel.appendChild(opt)

})

})

menuSel.addEventListener("change",calc)

}

}

function setActive(btn){

const buttons=btn.parentElement.querySelectorAll("button")

buttons.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

function setCoupon(v,btn){

coupon=v

setActive(btn)

calc()

}

function setDiscount(v,btn){

discount=v

setActive(btn)

calc()

}

function toggleNext(){

showNext=!showNext

document.getElementById("nextPay").style.display=
showNext ? "block" : "none"

}

function calc(){

let totalPrice=0

for(let i=1;i<=3;i++){

const v=document.getElementById("menu"+i).value

if(v){

totalPrice+=Number(v)

}

}

const tax=Math.round(totalPrice*1.1)

let afterCoupon=tax-coupon

if(afterCoupon<0)afterCoupon=0

const result=Math.round(afterCoupon*(1-discount/100))

document.getElementById("total").innerText="¥"+result

const next500=Math.ceil(result/500)*500

let text=""

for(let i=0;i<2;i++){

const target=next500+(i*500)

const diff=target-result

text+=target+"円まであと ¥"+diff+"<br>"

}

document.getElementById("nextPay").innerHTML=text

}

loadCSV()

</script>

</body>
</html>
